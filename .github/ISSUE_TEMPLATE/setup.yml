# .github/ISSUE_TEMPLATE/setup.yml
name: "🔧 Setup"
description: "Provisioning and configuration of infrastructure resources"
title: "[Setup] "
labels: ["setup"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what needs to be set up
    validations:
      required: true
  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      description: Steps or items to complete for this setup
      placeholder: |
        - [ ] Step 1
        - [ ] Step 2
        - [ ] Step 3
    validations:
      required: true
