# .github/ISSUE_TEMPLATE/test.yml
name: "✅ Test"
description: "Add or improve tests"
title: "[test] "
labels: ["test"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What should be tested?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Optional. Which components, layers, or scenarios?
    validations:
      required: false
  - type: textarea
    id: related
    attributes:
      label: Related issues or pull requests
      description: Optional. Link related work.
      placeholder: |
        Closes #123
        Related to #456
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Optional hint. The team may reprioritize.
      options:
        - Not set
        - Low
        - Normal
        - High
        - Blocker
      default: 0
    validations:
      required: false
