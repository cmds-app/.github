# .github/ISSUE_TEMPLATE/fix.yml
name: "🐛 Fix"
description: "Report a bug in the project"
title: "[fix] "
labels: ["fix"]
body:
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Where does this occur?
      placeholder: |
        - Branch or build:
        - Environment (dev / staging / production):
        - Tenant or organization (if applicable):
        - Browser and OS (if UI):
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happens? Include the steps you took so someone can reproduce it.
      placeholder: |
        Steps I took:
          1. Go to '...'
          2. Click '...'
        What happened:
          ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Optional. Who is affected? Is there a workaround? Is data at risk?
    validations:
      required: false
  - type: textarea
    id: evidence
    attributes:
      label: Logs or screenshots
      description: Optional. Attach or paste anything that helps.
    validations:
      required: false
  - type: textarea
    id: related
    attributes:
      label: Related issues or pull requests
      description: Optional. Link related work.
      placeholder: |
        Closes #123
        Related to #456
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Optional hint. The team may reprioritize.
      options:
        - Not set
        - Low
        - Normal
        - High
        - Blocker
      default: 0
    validations:
      required: false
