# .github/ISSUE_TEMPLATE/feat.yml
name: "✨ Feature"
description: "Propose a new feature or a change to an existing one"
title: "[feat] "
labels: ["feat"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to accomplish? What's getting in the way today?
      placeholder: |
        Today I have to...
        This is a problem because...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Solution
      description: What would you like to see happen? Describe the desired behavior.
      placeholder: |
        I'd like to be able to...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know this is done? List the outcomes that must be true.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: false
  - type: textarea
    id: related
    attributes:
      label: Related issues or pull requests
      description: Optional. Link related work.
      placeholder: |
        Closes #123
        Related to #456
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Optional hint. The team may reprioritize.
      options:
        - Not set
        - Low
        - Normal
        - High
        - Blocker
      default: 0
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        Add more sections (screenshots, examples, alternatives considered, out of scope) after the issue is opened.
