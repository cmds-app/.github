# .github/ISSUE_TEMPLATE/refactor.yml
name: "♻️ Refactor"
description: "Propose a code refactor with no user-visible behavior change"
title: "[refactor] "
labels: ["refactor"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What should be refactored?
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Rationale
      description: Why is this refactor worth doing now?
    validations:
      required: true
  - type: textarea
    id: related
    attributes:
      label: Related issues or pull requests
      description: Optional. Link related work.
      placeholder: |
        Closes #123
        Related to #456
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Optional hint. The team may reprioritize.
      options:
        - Not set
        - Low
        - Normal
        - High
        - Blocker
      default: 0
    validations:
      required: false
