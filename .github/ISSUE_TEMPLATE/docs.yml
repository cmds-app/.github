# .github/ISSUE_TEMPLATE/docs.yml
name: "📝 Docs"
description: "Add or correct documentation"
title: "[docs] "
labels: ["docs"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What should the documentation say, or what is wrong with what it says today?
    validations:
      required: true
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Optional. Which pages, files, or sections?
    validations:
      required: false
  - type: textarea
    id: related
    attributes:
      label: Related issues or pull requests
      description: Optional. Link related work.
      placeholder: |
        Closes #123
        Related to #456
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Optional hint. The team may reprioritize.
      options:
        - Not set
        - Low
        - Normal
        - High
        - Blocker
      default: 0
    validations:
      required: false
