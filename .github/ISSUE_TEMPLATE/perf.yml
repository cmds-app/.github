# .github/ISSUE_TEMPLATE/perf.yml
name: "⚡ Performance"
description: "Report or propose a performance improvement"
title: "[perf] "
labels: ["perf"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is slow, and what is the observed impact?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Where is this measured?
      placeholder: |
        - Branch or build:
        - Environment (dev / staging / production):
        - Tenant or organisation (if applicable):
    validations:
      required: false
  - type: textarea
    id: measurement
    attributes:
      label: Measurement
      description: Optional. Numbers if you have them (p95, timings, throughput, memory).
    validations:
      required: false
  - type: textarea
    id: related
    attributes:
      label: Related issues or pull requests
      description: Optional. Link related work.
      placeholder: |
        Closes #123
        Related to #456
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Optional hint. The team may reprioritise.
      options:
        - Not set
        - Low
        - Normal
        - High
        - Blocker
      default: 0
    validations:
      required: false
